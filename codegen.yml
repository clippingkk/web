overwrite: true
schema: src/schema/schema.json
# schema:
#   - "http://127.0.0.1:19654/api/v2/graphql":
#       headers:
#         Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjEiLCJleHAiOjE3OTE2NTA4MzMsImlhdCI6MTc3NjA5ODgzMywiaXNzIjoiY2stc2VydmVyQCJ9.FvKKfuOpZ7z2Dj8uWwBPCjevs8FaKvCHdkw4ym5qohY"
documents:
  - "src/schema/**/*.graphql"
  - "src/**/*.tsx"
generates:
  src/gql/:
    preset: 'client'
  src/schema/generated.tsx:
    plugins:
      - add:
          content: '// @ts-nocheck'
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
    config:
      withHooks: true
      apolloReactCommonImportFrom: '@/services/apollo-compat'
      apolloReactHooksImportFrom: '@/services/apollo-compat'
  ./src/schema/schema.json:
    plugins:
      - "introspection"
